<script>
    // আগের রেন্ডার ফাংশন ঠিক থাকবে
    function renderListings(listingsArray) {
        const container = document.getElementById('listingsContainer');
        const summary = document.getElementById('resultsSummary');
        const count = document.getElementById('resultCount');

        container.innerHTML = '';

        if (listingsArray.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <i class="fa fa-home"></i>
                    <h3>No listings found</h3>
                    <p>Try adjusting your filters</p>
                </div>
            `;
            summary.style.display = 'none';
        } else {
            summary.style.display = 'block';
            count.textContent = listingsArray.length;

            listingsArray.forEach(listing => {
                const card = document.createElement('div');
                card.className = 'listing-card';
                card.innerHTML = `
                    <div class="listing-card-header">
                        <h3>${listing.title}</h3>
                        <div class="listing-info">
                            <span class="listing-badge type-${(listing.type || '').toLowerCase()}">${listing.type}</span>
                            <span class="listing-badge"><i class="fa fa-bed"></i> ${listing.rooms} room(s)</span>
                        </div>
                    </div>
                    <div class="listing-card-body">
                        <div class="listing-description">${listing.description}</div>
                        <div>
                            <span class="listing-area"><i class="fa fa-map-marker"></i> ${listing.area} (${listing.areaBengali})</span>
                        </div>
                        <div class="listing-budget">৳${listing.budget.toLocaleString()} <small>per month</small></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    }

    // ব্যাকএন্ড API থেকে ডেটা আনার ফাংশন
    async function performSearch() {
        try {
            const btn = document.getElementById('searchBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Searching...';
            btn.disabled = true;

            const type = document.getElementById('typeSelect').value;
            const rooms = document.getElementById('roomsInput').value;
            const area = document.getElementById('areaInput').value;
            const budgetMin = document.getElementById('budgetMin').value;
            const budgetMax = document.getElementById('budgetMax').value;

            // API URL তৈরি করা (Vercel-এ একই ডোমেইন থাকায় /api/search কাজ করবে)
            const apiUrl = new URL(window.location.origin + '/api/search');
            
            if (type) apiUrl.searchParams.append('type', type);
            if (rooms) apiUrl.searchParams.append('rooms', rooms);
            if (area) apiUrl.searchParams.append('area', area);
            if (budgetMin) apiUrl.searchParams.append('minBudget', budgetMin);
            if (budgetMax) apiUrl.searchParams.append('maxBudget', budgetMax);

            const response = await fetch(apiUrl);
            
            if (!response.ok) throw new Error("Network response was not ok");
            
            const realData = await response.json();
            renderListings(realData);

        } catch (err) {
            console.error('Search error:', err);
            alert('সার্ভার থেকে ডেটা আনতে সমস্যা হচ্ছে। দয়া করে আবার চেষ্টা করুন।');
        } finally {
            const btn = document.getElementById('searchBtn');
            btn.innerHTML = '<i class="fa fa-search"></i> Search Listings';
            btn.disabled = false;
        }
    }

    function clearFilters() {
        document.getElementById('typeSelect').value = '';
        document.getElementById('roomsInput').value = '';
        document.getElementById('areaInput').value = '';
        document.getElementById('budgetMin').value = '';
        document.getElementById('budgetMax').value = '';
        performSearch(); // ক্লিয়ার করার পর আবার ডিফল্ট ডেটা আনবে
    }

    document.addEventListener('DOMContentLoaded', function() {
        performSearch(); // পেজ লোড হলেই ব্যাকএন্ড থেকে ডেটা আনবে

        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('clearBtn').addEventListener('click', clearFilters);

        const inputs = document.querySelectorAll('#roomsInput, #areaInput, #budgetMin, #budgetMax');
        inputs.forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });
        });
    });
</script>
